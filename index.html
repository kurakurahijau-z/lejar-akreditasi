<!doctype html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lejar Akreditasi</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root{
      --brand1:#4f46e5; /* indigo */
      --brand2:#06b6d4; /* cyan */
    }

    .card { box-shadow: 0 12px 35px rgba(2,6,23,.06); }
    .modal-backdrop { background: rgba(0,0,0,.35); }

    .card-accent{
      position: relative;
      overflow: hidden;
    }
    .card-accent:before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(700px 220px at 8% 0%, rgba(79,70,229,.12), transparent 55%),
        radial-gradient(700px 220px at 92% 0%, rgba(6,182,212,.10), transparent 55%);
      pointer-events:none;
    }

    .btn-glow{
      background: linear-gradient(135deg, var(--brand1), var(--brand2));
      color:#fff;
      box-shadow: 0 12px 28px rgba(79,70,229,.20);
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    }
    .btn-glow:hover{
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(6,182,212,.18), 0 12px 28px rgba(79,70,229,.16);
      filter: brightness(1.03);
    }
    .btn-glow:active{ transform: translateY(0) scale(.99); }

    .badge-pill{
      display:inline-flex; align-items:center; gap:.4rem;
      padding:.25rem .6rem;
      border-radius:999px;
      font-size:.75rem;
      font-weight:700;
      border:1px solid rgba(15,23,42,.10);
      user-select:none;
      white-space:nowrap;
    }
    .badge-dot{ width:.45rem; height:.45rem; border-radius:999px; }
    .badge-active{ background: rgba(34,197,94,.10); color:#166534; }
    .badge-active .badge-dot{ background:#22c55e; }
    .badge-closed{ background: rgba(245,158,11,.14); color:#92400e; }
    .badge-closed .badge-dot{ background:#f59e0b; }

    .row-hover:hover{ background: rgba(2,6,23,.02); }
  </style>
</head>

<body class="bg-slate-50 text-slate-900">
  <div class="max-w-6xl mx-auto px-4 py-6">
    <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
      <div>
        <h1 class="text-2xl font-bold">Lejar Akreditasi</h1>
        <p class="text-sm text-slate-500">Internal Jabatan • Waran & Belanja</p>
      </div>

      <div class="flex items-center gap-3">
        <div id="userBadge" class="hidden text-sm px-3 py-2 rounded-lg bg-white border">
          <span id="meEmail" class="font-medium"></span>
          <span id="meRole" class="ml-2 text-xs px-2 py-0.5 rounded bg-slate-100"></span>
        </div>

        <button id="btnLogout" class="hidden px-3 py-2 rounded-lg bg-white border hover:bg-slate-100 text-sm">
          Logout
        </button>

        <div id="gsiBtnWrap" class="min-h-[44px]"></div>
      </div>
    </header>

    <!-- Filters -->
    <section class="mt-5 grid grid-cols-1 md:grid-cols-3 gap-3">
      <div class="bg-white border rounded-xl p-4 card card-accent">
        <label class="text-xs text-slate-500">Tahun</label>
        <select id="fYear" class="mt-1 w-full border rounded-lg px-3 py-2">
          <option value="">Semua</option>
        </select>
      </div>

      <div class="bg-white border rounded-xl p-4 card card-accent md:col-span-2">
        <label class="text-xs text-slate-500">Carian</label>
        <div class="mt-1 flex gap-2">
          <input id="fQ" type="text" placeholder="No waran / perihal / payee / dokumen..."
                 class="w-full border rounded-lg px-3 py-2" />
          <button id="btnRefresh" class="px-4 py-2 rounded-lg btn-glow">Cari</button>
        </div>
      </div>
    </section>

    <!-- Summary -->
    <section class="mt-5 grid grid-cols-2 md:grid-cols-4 gap-3">
      <div class="bg-white border rounded-xl p-4 card card-accent">
        <div class="text-xs text-slate-500">Total Penerimaan</div>
        <div id="sumP" class="text-xl font-bold mt-1">RM 0</div>
      </div>
      <div class="bg-white border rounded-xl p-4 card card-accent">
        <div class="text-xs text-slate-500">Committed</div>
        <div id="sumC" class="text-xl font-bold mt-1">RM 0</div>
      </div>
      <div class="bg-white border rounded-xl p-4 card card-accent">
        <div class="text-xs text-slate-500">Draft</div>
        <div id="sumD" class="text-xl font-bold mt-1">RM 0</div>
      </div>
      <div class="bg-white border rounded-xl p-4 card card-accent">
        <div class="text-xs text-slate-500">Available</div>
        <div id="sumA" class="text-xl font-bold mt-1">RM 0</div>
      </div>
    </section>

    <!-- Admin actions -->
    <section class="mt-5 flex items-center justify-between">
      <div class="text-sm text-slate-500" id="countWaran">—</div>
      <button id="btnOpenAddWaran" class="hidden px-4 py-2 rounded-lg btn-glow">Tambah Waran</button>
    </section>

    <!-- Waran list -->
    <main id="waranList" class="mt-4 space-y-4"></main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 right-4 hidden">
      <div class="bg-slate-900 text-white px-4 py-3 rounded-lg shadow-lg text-sm" id="toastMsg"></div>
    </div>
  </div>

  <!-- Modal: Add/Edit Waran -->
  <div id="modalWaran" class="fixed inset-0 hidden items-center justify-center p-4">
    <div class="absolute inset-0 modal-backdrop"></div>
    <div class="relative bg-white w-full max-w-2xl rounded-2xl border card p-5">
      <div class="flex items-center justify-between">
        <h3 id="mwTitle" class="text-lg font-bold">Waran</h3>
        <button class="px-3 py-2 rounded-lg border hover:bg-slate-100" onclick="closeModal('modalWaran')">Tutup</button>
      </div>

      <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-slate-500">No Waran</label>
          <input id="mw_noWaran" class="mt-1 w-full border rounded-lg px-3 py-2" />
        </div>
        <div>
          <label class="text-xs text-slate-500">Tahun</label>
          <input id="mw_tahun" class="mt-1 w-full border rounded-lg px-3 py-2" placeholder="2026" />
        </div>

        <div>
          <label class="text-xs text-slate-500">Tarikh Terima</label>
          <input id="mw_tarikhTerima" type="date" class="mt-1 w-full border rounded-lg px-3 py-2" />
        </div>

        <div>
          <label class="text-xs text-slate-500">Jumlah Waran (RM)</label>
          <input id="mw_jumlah" type="number" step="0.01" class="mt-1 w-full border rounded-lg px-3 py-2" />
        </div>

        <div class="md:col-span-2">
          <label class="text-xs text-slate-500">Perihal</label>
          <input id="mw_perihal" class="mt-1 w-full border rounded-lg px-3 py-2" />
        </div>

        <div>
          <label class="text-xs text-slate-500">Status Waran</label>
          <select id="mw_status" class="mt-1 w-full border rounded-lg px-3 py-2">
            <option value="ACTIVE">ACTIVE</option>
            <option value="CLOSED">CLOSED</option>
          </select>
        </div>

        <div>
          <label class="text-xs text-slate-500">Catatan</label>
          <input id="mw_catatan" class="mt-1 w-full border rounded-lg px-3 py-2" />
        </div>
      </div>

      <div class="mt-5 flex items-center justify-end gap-2">
        <button id="mwSave" class="px-4 py-2 rounded-lg btn-glow">Save</button>
      </div>

      <input type="hidden" id="mw_waranId" />
      <div class="mt-3 text-xs text-rose-600 hidden" id="mwErr"></div>
    </div>
  </div>

  <!-- Modal: Edit Belanja -->
  <div id="modalBelanja" class="fixed inset-0 hidden items-center justify-center p-4">
    <div class="absolute inset-0 modal-backdrop"></div>
    <div class="relative bg-white w-full max-w-3xl rounded-2xl border card p-5">
      <div class="flex items-center justify-between">
        <h3 class="text-lg font-bold">Edit Belanja</h3>
        <button class="px-3 py-2 rounded-lg border hover:bg-slate-100" onclick="closeModal('modalBelanja')">Tutup</button>
      </div>

      <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-slate-500">Tarikh</label>
          <input id="mb_tarikh" type="date" class="mt-1 w-full border rounded-lg px-3 py-2" />
        </div>
        <div>
          <label class="text-xs text-slate-500">Amaun (RM)</label>
          <input id="mb_amaun" type="number" step="0.01" class="mt-1 w-full border rounded-lg px-3 py-2" />
        </div>

        <div class="md:col-span-2">
          <label class="text-xs text-slate-500">Perihal</label>
          <input id="mb_perihal" class="mt-1 w-full border rounded-lg px-3 py-2" />
        </div>

        <div>
          <label class="text-xs text-slate-500">Status Belanja</label>
          <select id="mb_status" class="mt-1 w-full border rounded-lg px-3 py-2">
            <option>KERTAS KERJA</option>
            <option>HANTAR PERMOHONAN</option>
            <option>SELESAI</option>
            <option>BATAL</option>
          </select>
        </div>

        <div>
          <label class="text-xs text-slate-500">No Dokumen</label>
          <input id="mb_noDokumen" class="mt-1 w-full border rounded-lg px-3 py-2" />
        </div>

        <div>
          <label class="text-xs text-slate-500">Payee</label>
          <input id="mb_payee" class="mt-1 w-full border rounded-lg px-3 py-2" />
        </div>

        <div>
          <label class="text-xs text-slate-500">Catatan</label>
          <input id="mb_catatan" class="mt-1 w-full border rounded-lg px-3 py-2" />
        </div>
      </div>

      <div class="mt-5 flex items-center justify-end gap-2">
        <button id="mbSave" class="px-4 py-2 rounded-lg btn-glow">Save</button>
      </div>

      <input type="hidden" id="mb_belanjaId" />
      <input type="hidden" id="mb_waranId" />
      <div class="mt-3 text-xs text-rose-600 hidden" id="mbErr"></div>
    </div>
  </div>

<script>
/** ================== CONFIG ================== **/
const API_BASE = "https://script.google.com/macros/s/AKfycbyZ_mFLmXqE5JscW6tuDJPukLiwskJ6E9PcvjDeMM92BiJ_ODBuzAiKfBsaq4iBvINx5w/exec";
const GOOGLE_CLIENT_ID = "637964120539-99tu5r1qa3k54vqbijvr4jtomj33o20d.apps.googleusercontent.com";

/** ================== STATE ================== **/
let STATE = {
  token: localStorage.getItem("lej_tok") || "",
  me: null,
  data: null,
};

/** ================== UTILS ================== **/
const el = (id) => document.getElementById(id);

function money(n){
  const x = Number(n||0);
  return "RM " + x.toLocaleString("en-MY", {minimumFractionDigits: 0, maximumFractionDigits: 2});
}

function toast(msg){
  el("toastMsg").textContent = msg;
  el("toast").classList.remove("hidden");
  clearTimeout(window.__t);
  window.__t = setTimeout(()=> el("toast").classList.add("hidden"), 2200);
}

function b64url(str){
  const b64 = btoa(unescape(encodeURIComponent(str)));
  return b64.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

function jsonp(action, data){
  return new Promise((resolve, reject)=>{
    const cb = "cb_" + Math.random().toString(36).slice(2);
    window[cb] = (res)=>{
      try { resolve(res); }
      finally {
        delete window[cb];
        script.remove();
      }
    };

    const payload = b64url(JSON.stringify(data||{}));
    const src = `${API_BASE}?action=${encodeURIComponent(action)}&callback=${encodeURIComponent(cb)}&data=${encodeURIComponent(payload)}&_ts=${Date.now()}`;
    const script = document.createElement("script");
    script.src = src;
    script.onerror = ()=> {
      delete window[cb];
      script.remove();
      reject(new Error("Failed to load JSONP"));
    };
    document.head.appendChild(script);
  });
}

async function api(action, data){
  const res = await jsonp(action, data);
  if (!res || res.ok !== true){
    const err = (res && res.error) ? res.error : "Unknown error";
    throw new Error(err);
  }
  return res.data;
}

function openModal(id){ el(id).classList.remove("hidden"); el(id).classList.add("flex"); }
function closeModal(id){ el(id).classList.add("hidden"); el(id).classList.remove("flex"); }
function showErr(id, msg){ const x=el(id); x.textContent=msg; x.classList.remove("hidden"); }
function hideErr(id){ const x=el(id); x.textContent=""; x.classList.add("hidden"); }

/* ✅ Fix: logout/unauth reset UI terus (tak perlu refresh) */
function resetUIToLoggedOut(){
  el("sumP").textContent = "RM 0";
  el("sumC").textContent = "RM 0";
  el("sumD").textContent = "RM 0";
  el("sumA").textContent = "RM 0";
  el("countWaran").textContent = "—";
  el("waranList").innerHTML = `<div class="bg-white border rounded-xl p-6 text-slate-500">Sila login dulu.</div>`;
}

/** ================== LOGIN ================== **/
function renderGsi(){
  el("gsiBtnWrap").innerHTML = "";
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: async (resp)=>{
      try{
        const id_token = resp.credential;
        const out = await api("login", { id_token });
        STATE.token = out.token;
        localStorage.setItem("lej_tok", STATE.token);
        toast("Login berjaya");
        await bootstrap();
      }catch(e){
        console.error(e);
        toast("Login gagal: " + e.message);
      }
    }
  });

  google.accounts.id.renderButton(el("gsiBtnWrap"), {
    theme: "outline",
    size: "large",
    text: "signin_with",
    shape: "pill"
  });
}

async function bootstrap(){
  if (!STATE.token){
    resetUIToLoggedOut();
    el("userBadge").classList.add("hidden");
    el("btnLogout").classList.add("hidden");
    el("btnOpenAddWaran").classList.add("hidden");
    renderGsi();
    return;
  }

  try{
    const me = await api("me", { token: STATE.token });
    STATE.me = me;

    el("meEmail").textContent = me.email;
    el("meRole").textContent = (me.role || "user").toUpperCase();
    el("userBadge").classList.remove("hidden");
    el("btnLogout").classList.remove("hidden");

    if ((me.role||"").toLowerCase()==="admin"){
      el("btnOpenAddWaran").classList.remove("hidden");
    } else {
      el("btnOpenAddWaran").classList.add("hidden");
    }

    renderYearOptions();
    await refresh();

  }catch(e){
    console.error(e);
    toast("Session expired, login balik.");
    localStorage.removeItem("lej_tok");
    STATE.token="";
    STATE.me=null;
    resetUIToLoggedOut();
    await bootstrap();
  }
}

function renderYearOptions(){
  const sel = el("fYear");
  const nowY = new Date().getFullYear();
  const years = [];
  for (let y = nowY-2; y <= nowY+2; y++) years.push(String(y));
  sel.innerHTML = `<option value="">Semua</option>` + years.map(y=>`<option value="${y}">${y}</option>`).join("");
}

/** ================== DATA ================== **/
async function refresh(){
  const year = el("fYear").value.trim();
  const q = el("fQ").value.trim();

  el("waranList").innerHTML = `<div class="bg-white border rounded-xl p-6 text-slate-500">Loading…</div>`;

  try{
    const data = await api("getAll", { token: STATE.token, year, q });
    STATE.data = data;
    render(data);
  }catch(e){
    console.error(e);
    el("waranList").innerHTML = `<div class="bg-white border rounded-xl p-6 text-rose-600">Error: ${escapeHtml(e.message)}</div>`;
  }
}

function render(data){
  const s = data.summary || {};
  el("sumP").textContent = money(s.totalPenerimaan);
  el("sumC").textContent = money(s.totalCommitted);
  el("sumD").textContent = money(s.totalDraft);
  el("sumA").textContent = money(s.totalAvailable);

  const waran = data.waran || [];
  el("countWaran").textContent = `${waran.length} waran`;

  if (!waran.length){
    el("waranList").innerHTML = `<div class="bg-white border rounded-xl p-6 text-slate-500">Tiada rekod.</div>`;
    return;
  }

  el("waranList").innerHTML = waran.map(w => {
    const st = (w.statusWaran||"ACTIVE").toUpperCase();
    const locked = (st==="CLOSED");
    const c = w.computed || {};
    const isAdmin = (STATE.me && (STATE.me.role||"").toLowerCase()==="admin");

    return `
      <section class="bg-white border rounded-2xl p-5 card card-accent">
        <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-3">
          <div>
            <div class="text-lg font-bold">${escapeHtml(w.noWaran || w.waranId)}</div>
            <div class="text-sm text-slate-500">${escapeHtml(w.tarikhTerima || "")} • ${escapeHtml(w.perihal || "")}</div>
          </div>

          <div class="flex items-center gap-2 flex-wrap">
            <span class="badge-pill ${st==='CLOSED' ? 'badge-closed' : 'badge-active'}">
              <span class="badge-dot"></span>${escapeHtml(st)}
            </span>
            <button class="px-3 py-2 rounded-lg border hover:bg-slate-100" onclick="exportPdf('${escapeJs(w.waranId)}')">Export PDF</button>
            ${isAdmin ? `<button class="px-3 py-2 rounded-lg bg-white border hover:bg-slate-100" onclick="openEditWaran('${escapeJs(w.waranId)}')">Edit</button>` : ``}
          </div>
        </div>

        <div class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3">
          <div class="border rounded-xl p-3 bg-white/70">
            <div class="text-xs text-slate-500">Jumlah Waran</div>
            <div class="text-lg font-bold">${money(w.jumlahWaran)}</div>
          </div>
          <div class="border rounded-xl p-3 bg-white/70">
            <div class="text-xs text-slate-500">Committed</div>
            <div class="text-lg font-bold">${money(c.committed)}</div>
          </div>
          <div class="border rounded-xl p-3 bg-white/70">
            <div class="text-xs text-slate-500">Draft</div>
            <div class="text-lg font-bold">${money(c.draft)}</div>
          </div>
          <div class="border rounded-xl p-3 bg-white/70">
            <div class="text-xs text-slate-500">Available</div>
            <div class="text-lg font-bold">${money(c.available)}</div>
          </div>
        </div>

        <div class="mt-4">
          <div class="text-sm font-semibold">Belanja</div>

          <div class="mt-2 overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="text-xs text-slate-500 border-b">
                <tr>
                  <th class="text-left py-2">BelanjaID / Tarikh</th>
                  <th class="text-left py-2">Perihal</th>
                  <th class="text-right py-2">Amaun</th>
                  <th class="text-left py-2">Status</th>
                  <th class="text-left py-2">No Dokumen</th>
                  <th class="text-left py-2">Payee</th>
                  <th class="text-left py-2">Tindakan</th>
                </tr>
              </thead>
              <tbody>
                ${(w.belanja||[]).map(b=>{
                  const dis = locked ? "disabled" : "";
                  const opt = ["KERTAS KERJA","HANTAR PERMOHONAN","SELESAI","BATAL"];
                  return `
                    <tr class="border-b row-hover">
                      <td class="py-2">
                        <div class="font-medium">${escapeHtml(b.belanjaId)}</div>
                        <div class="text-xs text-slate-500">${escapeHtml(b.tarikh||"")}</div>
                      </td>
                      <td class="py-2">${escapeHtml(b.perihal||"")}</td>
                      <td class="py-2 text-right font-medium">${money(b.amaun)}</td>
                      <td class="py-2">
                        <select class="border rounded-lg px-2 py-1 ${locked?'bg-slate-100':''}" ${dis}
                          onchange="updateBelanjaStatus('${escapeJs(b.belanjaId)}', this.value)">
                          ${opt.map(x=>`<option ${String(b.statusBelanja).toUpperCase()===x?'selected':''}>${x}</option>`).join("")}
                        </select>
                      </td>
                      <td class="py-2">${escapeHtml(b.noDokumen||"")}</td>
                      <td class="py-2">${escapeHtml(b.payee||"")}</td>
                      <td class="py-2">
                        <button class="px-3 py-1.5 rounded-lg border hover:bg-slate-100 ${locked?'opacity-40 pointer-events-none':''}"
                          onclick="openEditBelanja('${escapeJs(w.waranId)}','${escapeJs(b.belanjaId)}')">Edit</button>
                      </td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>

          <div class="mt-4 border rounded-2xl p-4 ${locked?'opacity-50':''} bg-white/70">
            <div class="font-semibold text-sm">Tambah Belanja (waran ini)</div>
            <div class="mt-3 grid grid-cols-1 md:grid-cols-6 gap-2">
              <input id="ab_perihal_${escapeHtml(w.waranId)}" class="border rounded-lg px-3 py-2 md:col-span-2" placeholder="Perihal" ${locked?'disabled':''}/>
              <input id="ab_amaun_${escapeHtml(w.waranId)}" type="number" step="0.01" class="border rounded-lg px-3 py-2" placeholder="Amaun" ${locked?'disabled':''}/>
              <select id="ab_status_${escapeHtml(w.waranId)}" class="border rounded-lg px-3 py-2" ${locked?'disabled':''}>
                <option>KERTAS KERJA</option>
                <option>HANTAR PERMOHONAN</option>
                <option>SELESAI</option>
                <option>BATAL</option>
              </select>
              <input id="ab_noDoc_${escapeHtml(w.waranId)}" class="border rounded-lg px-3 py-2" placeholder="No Dokumen" ${locked?'disabled':''}/>
              <input id="ab_payee_${escapeHtml(w.waranId)}" class="border rounded-lg px-3 py-2" placeholder="Payee" ${locked?'disabled':''}/>
            </div>

            <div class="mt-2 grid grid-cols-1 md:grid-cols-6 gap-2">
              <input id="ab_tarikh_${escapeHtml(w.waranId)}" type="date" class="border rounded-lg px-3 py-2 md:col-span-2" ${locked?'disabled':''}/>
              <input id="ab_catatan_${escapeHtml(w.waranId)}" class="border rounded-lg px-3 py-2 md:col-span-4" placeholder="Catatan (optional)" ${locked?'disabled':''}/>
            </div>

            <div class="mt-3">
              <button class="px-4 py-2 rounded-lg btn-glow ${locked?'opacity-40 pointer-events-none':''}"
                onclick="addBelanja('${escapeJs(w.waranId)}','${escapeJs(w.noWaran)}')">
                Tambah Belanja
              </button>
              ${locked?`<span class="ml-2 text-xs text-slate-500">Waran CLOSED: belanja dikunci.</span>`:""}
            </div>
          </div>

        </div>
      </section>
    `;
  }).join("");
}

function escapeHtml(s){
  return String(s??"").replace(/[&<>"']/g, m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
}
function escapeJs(s){
  return String(s??"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");
}
